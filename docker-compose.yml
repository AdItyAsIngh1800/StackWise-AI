version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stackwise_backend
    ports:
      - "8000:8000"
    volumes:
      - ./engine/ml:/app/engine/ml
      - ./data:/app/data
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: stackwise_ai
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stackwise_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: stackwise_db
    restart: always
    environment:
      POSTGRES_DB: stackwise_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  