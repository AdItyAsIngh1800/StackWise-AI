version: "3.9"

services:
  db:
    image: postgres:16
    container_name: stackwise_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stackwise_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stackwise_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: stackwise_ai
      PGUSER: postgres
      PGPASSWORD: postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend-react/Dockerfile
    container_name: stackwise_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  postgres_data: