databases:
  - id: postgresql
    type: relational
    best_for: [general, scalable, production]
    complexity: medium
    scalability: high

  - id: mysql
    type: relational
    best_for: [web, simple-backend]
    complexity: low
    scalability: medium

  - id: mongodb
    type: document
    best_for: [flexible-schema, rapid-development]
    complexity: low
    scalability: high

  - id: redis
    type: in-memory
    best_for: [cache, sessions, real-time]
    complexity: low
    scalability: medium

  - id: sqlite
    type: embedded
    best_for: [prototype, local]
    complexity: very-low
    scalability: low